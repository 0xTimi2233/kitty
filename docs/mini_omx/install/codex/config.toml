#:schema https://developers.openai.com/codex/config-schema.json

model_reasoning_effort = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
project_doc_max_bytes = 65536

[features]
multi_agent = true
codex_hooks = true
shell_snapshot = true

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[profiles.planning]
model_reasoning_effort = "high"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[profiles.execution]
model_reasoning_effort = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[profiles.review]
model_reasoning_effort = "high"
approval_policy = "on-request"
sandbox_mode = "read-only"

[[skills.config]]
path = "skills/mini-intake"
enabled = true

[[skills.config]]
path = "skills/mini-plan"
enabled = true

[[skills.config]]
path = "skills/mini-spec"
enabled = true

[[skills.config]]
path = "skills/mini-ralph"
enabled = true

[[skills.config]]
path = "skills/mini-team"
enabled = true

[[skills.config]]
path = "skills/mini-verify"
enabled = true

[[skills.config]]
path = "skills/mini-reset"
enabled = true

